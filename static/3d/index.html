<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metaphors 3D</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #0a0a1a; 
            color: #e0e0e0; 
            font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden;
        }
        #app { 
            width: 100vw; 
            height: 100vh; 
            position: relative;
        }
        #canvas3d {
            width: 100%;
            height: 100%;
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #toolbar {
            position: absolute;
            top: 16px;
            left: 16px;
            z-index: 10;
        }
        #metaphor-select {
            background: #1f2937;
            color: #e5e7eb;
            border: 1px solid #374151;
            border-radius: 4px;
            padding: 8px 12px;
            font-size: 14px;
            cursor: pointer;
            width: 200px;
            margin-bottom: 8px;
        }
        #metaphor-select:hover {
            border-color: #60a5fa;
        }
        .toolbar-info {
            background: rgba(17, 24, 39, 0.9);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #374151;
            min-width: 200px;
        }
        .toolbar-title {
            font-weight: bold;
            margin-bottom: 4px;
        }
        .toolbar-desc {
            font-size: 11px;
            color: #6b7280;
            margin-bottom: 8px;
        }
        .shortcut-hint {
            font-size: 9px;
            color: #4b5563;
            margin-top: 4px;
            line-height: 1.4;
        }
        .shortcut-hint kbd {
            background: #1f2937;
            border: 1px solid #374151;
            border-radius: 3px;
            padding: 0 3px;
            font-family: monospace;
            font-size: 9px;
            color: #9ca3af;
        }
        #fade-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            z-index: 5;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease-in-out;
        }
        #fade-overlay.active {
            opacity: 1;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 18px;
            color: #60a5fa;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div id="app">
        <canvas id="canvas3d"></canvas>
        <div id="toolbar">
            <div class="toolbar-info">
                <div class="toolbar-title">🌐 Metaphors 3D</div>
                <div id="metaphor-desc" class="toolbar-desc"></div>
                <select id="metaphor-select"></select>
                <div class="shortcut-hint">
                    <kbd>1</kbd>-<kbd>9</kbd> switch metaphor
                </div>
            </div>
        </div>
        <div id="fade-overlay"></div>
        <div id="loading">Loading 3D engine...</div>
    </div>
    
    <!-- Three.js from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <!-- Metaphor renderers -->
    <script src="/static/3d/metaphors/base.js"></script>
    <script src="/static/3d/metaphors/city.js"></script>
    <script src="/static/3d/metaphors/solar.js"></script>
    <script src="/static/3d/metaphors/forest.js"></script>
    <script src="/static/3d/metaphors/traffic_light.js"></script>
    <script src="/static/3d/metaphors/space.js"></script>
    <script src="/static/3d/metaphors/garden.js"></script>
    
    <!-- Main 3D controller -->
    <script src="/static/3d/main3d.js"></script>
</body>
</html>
